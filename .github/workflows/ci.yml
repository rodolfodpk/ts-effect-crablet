name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      # test:integration runs under Node (node --test), not Bun - @testcontainers/postgresql
      # hangs indefinitely under Bun's wait-strategy handling (see NOTES.md).
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Unit tests (Bun)
        run: bun run test:unit

      - name: Integration tests (Node + Testcontainers)
        run: bun run test:integration
